<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="modern-normalize.css">
    <link rel="stylesheet" href="./styles.css">
    <script src="./main.js" defer></script>
    <title>Tic-Tac-Toe</title>
</head>
<body>
    <div id="container">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
    </div>
    <div id="buttons">
        <button command="show-modal" commandfor="form-container" type="button" id="start-btn">Start Game</button>
        <button id="reset-btn">Reset</button>
    </div>
    <div id="display"></div>

    <dialog id="form-container" closeby="none">
        <form method="dialog" id="form" autofocus>
            <legend>Enter Player Names</legend>
            
            <div class="form-group">
                <label for="player-1">Player 1 Name</label>
                <input type="text" id="player-1" name="player-1" placeholder="James" required>
            </div>

            <div class="form-group">
                <label for="player-2">Player 2 Name</label>
                <input type="text" id="player-2" name="player-2" placeholder="Dean" required>
            </div>

            <button type="submit" id="start-game">Start Game</button>
        </form>
    </dialog>
</body>
</html>
